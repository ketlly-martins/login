<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro ✨</title>

    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="formulario.css">
</head>

<body class="painel-body">


    <header class="painel-header">
        <div class="logo">Dados pessoais</div>
        <nav class="menu">
            <a href="#">Início</a>
            <button class="btn-sair" onclick="window.location.href='index.html'">Sair</button>
        </nav>
    </header>


    <main class="painel-container">
        <div class="cadastro-card">
            <h1>Seja bem-vinda! ✨</h1>
            <p class="subtitulo">Por favor, preencha os seus dados abaixo:</p>

            <form>

                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Digite seu nome completo">
                </div>


                <div class="form-linha">
                    <div class="input-group">
                        <label for="nascimento">Data de Nascimento</label>
                        <input type="date" id="nascimento" required>
                    </div>
                    <div class="input-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" required placeholder="000.000.000-00">
                    </div>
                </div>


                <div class="form-linha">
                    <div class="input-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" required placeholder="(00) 00000-0000">
                    </div>
                    <div class="input-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" required placeholder="00000-000">
                    </div>
                </div>


                <div class="input-group">
                    <label for="rua">Rua / Bairro</label>
                    <input type="text" id="rua" required placeholder="Nome da sua rua">
                </div>


                <div class="form-linha">
                    <div class="input-group" style="flex: 2;">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" required placeholder="Seu bairro">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" required placeholder="Nº">
                    </div>
                </div>


                <div class="form-linha">
                    <div class="input-group" style="flex: 2;">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" required placeholder="Sua cidade">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label for="estado">Estado</label>
                        <input type="text" id="estado" required placeholder="UF">
                    </div>
                </div>

                <button type="submit" class="btn-entrar" style="margin-top: 20px; width: 100%; background-color: #ff8fa3; color: white; border: none; padding: 14px; border-radius: 12px; font-family: 'Poppins', Arial, sans-serif; font-size: 16px; font-weight: bold; cursor: pointer;">Salvar Cadastro 💖</button>

            </form>
        </div>
    </main>

</body>

</html>
